services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    restart: always
    environment:
      # === Required Settings
      MAIN_URL: '${POSTIZ_URL:-https://postiz.helloanwar.com}'
      FRONTEND_URL: '${POSTIZ_URL:-https://postiz.helloanwar.com}'
      NEXT_PUBLIC_BACKEND_URL: '${POSTIZ_BACKEND_URL:-https://postiz.helloanwar.com/api}'
      JWT_SECRET: '${POSTIZ_JWT_SECRET:?Set POSTIZ_JWT_SECRET in Coolify}'
      DATABASE_URL: 'postgresql://postiz-user:${POSTIZ_POSTGRES_PASSWORD:?Set POSTIZ_POSTGRES_PASSWORD in Coolify}@postiz-postgres:5432/postiz-db-local'
      REDIS_URL: 'redis://postiz-redis:6379'
      BACKEND_INTERNAL_URL: 'http://localhost:3000'
      TEMPORAL_ADDRESS: 'temporal:7233'
      IS_GENERAL: '${POSTIZ_IS_GENERAL:-true}'
      DISABLE_REGISTRATION: '${POSTIZ_DISABLE_REGISTRATION:-false}'
      RUN_CRON: '${POSTIZ_RUN_CRON:-true}'

      # === Storage Settings
      STORAGE_PROVIDER: '${POSTIZ_STORAGE_PROVIDER:-local}'
      UPLOAD_DIRECTORY: '/uploads'
      NEXT_PUBLIC_UPLOAD_DIRECTORY: '/uploads'

      # === Cloudflare (R2) Settings
      CLOUDFLARE_ACCOUNT_ID: '${CLOUDFLARE_ACCOUNT_ID:-}'
      CLOUDFLARE_ACCESS_KEY: '${CLOUDFLARE_ACCESS_KEY:-}'
      CLOUDFLARE_SECRET_ACCESS_KEY: '${CLOUDFLARE_SECRET_ACCESS_KEY:-}'
      CLOUDFLARE_BUCKETNAME: '${CLOUDFLARE_BUCKETNAME:-}'
      CLOUDFLARE_BUCKET_URL: '${CLOUDFLARE_BUCKET_URL:-}'
      CLOUDFLARE_REGION: '${CLOUDFLARE_REGION:-auto}'

      # === Social Media API Settings
      X_API_KEY: '${X_API_KEY:-}'
      X_API_SECRET: '${X_API_SECRET:-}'
      LINKEDIN_CLIENT_ID: '${LINKEDIN_CLIENT_ID:-}'
      LINKEDIN_CLIENT_SECRET: '${LINKEDIN_CLIENT_SECRET:-}'
      REDDIT_CLIENT_ID: '${REDDIT_CLIENT_ID:-}'
      REDDIT_CLIENT_SECRET: '${REDDIT_CLIENT_SECRET:-}'
      GITHUB_CLIENT_ID: '${GITHUB_CLIENT_ID:-}'
      GITHUB_CLIENT_SECRET: '${GITHUB_CLIENT_SECRET:-}'
      BEEHIIVE_API_KEY: '${BEEHIIVE_API_KEY:-}'
      BEEHIIVE_PUBLICATION_ID: '${BEEHIIVE_PUBLICATION_ID:-}'
      THREADS_APP_ID: '${THREADS_APP_ID:-}'
      THREADS_APP_SECRET: '${THREADS_APP_SECRET:-}'
      FACEBOOK_APP_ID: '${FACEBOOK_APP_ID:-}'
      FACEBOOK_APP_SECRET: '${FACEBOOK_APP_SECRET:-}'
      YOUTUBE_CLIENT_ID: '${YOUTUBE_CLIENT_ID:-}'
      YOUTUBE_CLIENT_SECRET: '${YOUTUBE_CLIENT_SECRET:-}'
      TIKTOK_CLIENT_ID: '${TIKTOK_CLIENT_ID:-}'
      TIKTOK_CLIENT_SECRET: '${TIKTOK_CLIENT_SECRET:-}'
      PINTEREST_CLIENT_ID: '${PINTEREST_CLIENT_ID:-}'
      PINTEREST_CLIENT_SECRET: '${PINTEREST_CLIENT_SECRET:-}'
      DRIBBBLE_CLIENT_ID: '${DRIBBBLE_CLIENT_ID:-}'
      DRIBBBLE_CLIENT_SECRET: '${DRIBBBLE_CLIENT_SECRET:-}'
      DISCORD_CLIENT_ID: '${DISCORD_CLIENT_ID:-}'
      DISCORD_CLIENT_SECRET: '${DISCORD_CLIENT_SECRET:-}'
      DISCORD_BOT_TOKEN_ID: '${DISCORD_BOT_TOKEN_ID:-}'
      SLACK_ID: '${SLACK_ID:-}'
      SLACK_SECRET: '${SLACK_SECRET:-}'
      SLACK_SIGNING_SECRET: '${SLACK_SIGNING_SECRET:-}'
      MASTODON_URL: '${MASTODON_URL:-https://mastodon.social}'
      MASTODON_CLIENT_ID: '${MASTODON_CLIENT_ID:-}'
      MASTODON_CLIENT_SECRET: '${MASTODON_CLIENT_SECRET:-}'

      # === OAuth & Authentik Settings
      NEXT_PUBLIC_POSTIZ_OAUTH_DISPLAY_NAME: '${NEXT_PUBLIC_POSTIZ_OAUTH_DISPLAY_NAME:-}'
      NEXT_PUBLIC_POSTIZ_OAUTH_LOGO_URL: '${NEXT_PUBLIC_POSTIZ_OAUTH_LOGO_URL:-}'
      POSTIZ_GENERIC_OAUTH: '${POSTIZ_GENERIC_OAUTH:-false}'
      POSTIZ_OAUTH_URL: '${POSTIZ_OAUTH_URL:-}'
      POSTIZ_OAUTH_AUTH_URL: '${POSTIZ_OAUTH_AUTH_URL:-}'
      POSTIZ_OAUTH_TOKEN_URL: '${POSTIZ_OAUTH_TOKEN_URL:-}'
      POSTIZ_OAUTH_USERINFO_URL: '${POSTIZ_OAUTH_USERINFO_URL:-}'
      POSTIZ_OAUTH_CLIENT_ID: '${POSTIZ_OAUTH_CLIENT_ID:-}'
      POSTIZ_OAUTH_CLIENT_SECRET: '${POSTIZ_OAUTH_CLIENT_SECRET:-}'
      POSTIZ_OAUTH_SCOPE: '${POSTIZ_OAUTH_SCOPE:-}'

      # === Misc Settings
      OPENAI_API_KEY: '${OPENAI_API_KEY:-}'
      NEXT_PUBLIC_DISCORD_SUPPORT: '${NEXT_PUBLIC_DISCORD_SUPPORT:-}'
      NEXT_PUBLIC_POLOTNO: '${NEXT_PUBLIC_POLOTNO:-}'
      API_LIMIT: '${POSTIZ_API_LIMIT:-30}'

      # === Payment / Stripe Settings
      FEE_AMOUNT: '${POSTIZ_FEE_AMOUNT:-0.05}'
      STRIPE_PUBLISHABLE_KEY: '${STRIPE_PUBLISHABLE_KEY:-}'
      STRIPE_SECRET_KEY: '${STRIPE_SECRET_KEY:-}'
      STRIPE_SIGNING_KEY: '${STRIPE_SIGNING_KEY:-}'
      STRIPE_SIGNING_KEY_CONNECT: '${STRIPE_SIGNING_KEY_CONNECT:-}'

      # === Developer Settings
      NX_ADD_PLUGINS: '${NX_ADD_PLUGINS:-false}'

      # === Short Link Service Settings
      DUB_TOKEN: '${DUB_TOKEN:-}'
      DUB_API_ENDPOINT: '${DUB_API_ENDPOINT:-https://api.dub.co}'
      DUB_SHORT_LINK_DOMAIN: '${DUB_SHORT_LINK_DOMAIN:-dub.sh}'
      SHORT_IO_SECRET_KEY: '${SHORT_IO_SECRET_KEY:-}'
      KUTT_API_KEY: '${KUTT_API_KEY:-}'
      KUTT_API_ENDPOINT: '${KUTT_API_ENDPOINT:-https://kutt.it/api/v2}'
      KUTT_SHORT_LINK_DOMAIN: '${KUTT_SHORT_LINK_DOMAIN:-kutt.it}'
      LINK_DRIP_API_KEY: '${LINK_DRIP_API_KEY:-}'
      LINK_DRIP_API_ENDPOINT: '${LINK_DRIP_API_ENDPOINT:-https://api.linkdrip.com/v1/}'
      LINK_DRIP_SHORT_LINK_DOMAIN: '${LINK_DRIP_SHORT_LINK_DOMAIN:-dripl.ink}'
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    expose:
      - '5000'
    networks:
      - postiz-network
      - temporal-network
    healthcheck:
      test: ["CMD", "node", "-e", "const r=require('http').get('http://localhost:5000/',res=>process.exit(res.statusCode<500?0:1));r.on('error',()=>process.exit(1));r.setTimeout(4000,()=>{r.destroy();process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_healthy

  postiz-postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: '${POSTIZ_POSTGRES_PASSWORD:?Set POSTIZ_POSTGRES_PASSWORD in Coolify}'
      POSTGRES_USER: 'postiz-user'
      POSTGRES_DB: 'postiz-db-local'
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz-user -d postiz-db-local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postiz-redis:
    image: redis:7.2
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-network

  # For Application Monitoring / Debugging
  spotlight:
    profiles: [debug]
    pull_policy: always
    restart: unless-stopped
    expose:
      - '8969'
    image: ghcr.io/getsentry/spotlight:latest
    networks:
      - postiz-network

  # -----------------------
  # Temporal Stack
  # -----------------------
  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    restart: always
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - temporal-network
    expose:
      - '9200'
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - temporal-elasticsearch-data:/usr/share/elasticsearch/data

  temporal-postgresql:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: '${TEMPORAL_POSTGRES_PASSWORD:?Set TEMPORAL_POSTGRES_PASSWORD in Coolify}'
      POSTGRES_USER: 'temporal'
      POSTGRES_DB: 'temporal'
    networks:
      - temporal-network
    expose:
      - '5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.28.1
    restart: always
    depends_on:
      temporal-postgresql:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_healthy
    environment:
      DB: 'postgres12'
      DB_PORT: '5432'
      POSTGRES_USER: 'temporal'
      POSTGRES_PWD: '${TEMPORAL_POSTGRES_PASSWORD:?Set TEMPORAL_POSTGRES_PASSWORD in Coolify}'
      POSTGRES_SEEDS: 'temporal-postgresql'
      DYNAMIC_CONFIG_FILE_PATH: 'config/dynamicconfig/development-sql.yaml'
      ENABLE_ES: 'true'
      ES_SEEDS: 'temporal-elasticsearch'
      ES_VERSION: 'v7'
      TEMPORAL_NAMESPACE: 'default'
      TEMPORAL_ADDRESS: 'temporal:7233'
      TEMPORAL_CLI_ADDRESS: 'temporal:7233'
    networks:
      - temporal-network
    expose:
      - '7233'
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address 127.0.0.1:7233 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    labels:
      kompose.volume.type: configMap

  temporal-admin-tools:
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    restart: on-failure
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    networks:
      - temporal-network
    stdin_open: true
    depends_on:
      temporal:
        condition: service_healthy
    tty: true

  temporal-ui:
    image: temporalio/ui:2.34.0
    restart: always
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=${POSTIZ_URL:-https://postiz.helloanwar.com}
    networks:
      - temporal-network
    expose:
      - '8080'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      temporal:
        condition: service_healthy

volumes:
  postgres-volume:
    external: false
  postiz-redis-data:
    external: false
  postiz-config:
    external: false
  postiz-uploads:
    external: false
  temporal-postgres-data:
    external: false
  temporal-elasticsearch-data:
    external: false

networks:
  postiz-network:
    external: false
  temporal-network:
    external: false
